name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-v1-${{ hashFiles('package.json') }}
          restore-keys: node-modules-v1-

      - name: Install all dependencies
        run: npm install

      - name: Export web bundle
        run: npx expo export --platform web --output-dir dist

      - name: Convert absolute paths to relative paths for GitHub Pages subpath
        run: |
          # Fix index.html: change absolute paths to relative
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html
          sed -i 's|href="/favicon.ico"|href="./favicon.ico"|g' dist/index.html
          # Fix all JS bundles and assets: absolute → relative
          find dist -name "*.js" -o -name "*.css" -o -name "*.html" | xargs sed -i 's|="/_|="./_|g'

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
